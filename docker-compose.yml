services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: filaks-mssql
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Filaks!Pass2026"
      MSSQL_PID: Developer
    ports:
      - "14330:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./FilaksOne/FilaksOne.bak:/var/opt/mssql/backup/FilaksOne.bak:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
    environment:
      DB_SERVER: sqlserver
      DB_NAME: FilaksOne
      DB_USER: sa
      DB_PASSWORD: "Filaks!Pass2026"
      BACKUP_FILE: /var/opt/mssql/backup/FilaksOne.bak
      DATA_PATH: /var/opt/mssql/data/
    entrypoint: ["/bin/bash", "/scripts/restore-db.sh"]
    restart: "no"

  db-readonly-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      db-init:
        condition: service_completed_successfully
    volumes:
      - ./docker:/docker-init:ro
    environment:
      DB_SERVER: sqlserver
      DB_USER: sa
      DB_PASSWORD: "Filaks!Pass2026"
    entrypoint: ["/bin/bash", "-c", "/opt/mssql-tools18/bin/sqlcmd -S \"$$DB_SERVER\" -U \"$$DB_USER\" -P \"$$DB_PASSWORD\" -C -b -i /docker-init/create-readonly-user.sql"]
    restart: "no"

  ollama:
    image: ollama/ollama:latest
    container_name: filaks-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
    # ollama service DNS can lag a beat behind its healthcheck passing,
    # so retry a few times instead of failing on the first race.
    entrypoint: ["/bin/sh", "-c", "for i in $(seq 1 10); do ollama pull qwen2.5-coder:7b && exit 0; echo 'retrying in 3s...'; sleep 3; done; exit 1"]
    restart: "no"

volumes:
  mssql-data:
  ollama-data:
