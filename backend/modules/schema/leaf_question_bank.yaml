    FROM cobra.CdcBewZahlArt
    GROUP BY ZahlArtId
    ORDER BY n DESC
  verified: true
  row_count: 5
  chart_hint: bar
  note: "ZahlArtId is an opaque code -- no payment-method dictionary is joined in this leaf (CdcZahlArten is excluded, #40, system config), so the answer groups by raw code rather than a readable label like 'Bar'/'EC-Karte'."

