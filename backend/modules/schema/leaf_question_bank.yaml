# --- FINANCE.WORKSHOP_BILLING (#40) ---------------------------------------------------------
- id: finance_billing_open_by_sollhaben
  node: FINANCE.WORKSHOP_BILLING
  bucket: A
  question: "Wie hoch ist die Gesamtsumme der Soll- und Haben-Buchungen?"
  reference_sql: |
    SELECT SollHaben, SUM(Betrag) AS TotalAmount, COUNT(*) AS n
    FROM cobra.CdaBuchKtoSt
    WHERE SollHaben IS NOT NULL
    GROUP BY SollHaben
  verified: true
  row_count: 2
  chart_hint: bar
  note: "No precomputed running-balance (Saldo) column exists on CdaBuchKtoSt (the doc's own 'overdue receivables' example query assumes one that doesn't exist live) -- this SUM(Betrag) grouped by SollHaben ('S'=Soll/debit, 'H'=Haben/credit) is the live-verified way to get an open-balance-shaped answer instead."

- id: finance_billing_top_accounts
  node: FINANCE.WORKSHOP_BILLING
  bucket: A
  question: "Auf welche Sachkonten werden die meisten Buchungen gebucht?"
  reference_sql: |
    SELECT TOP 5 sk.Bezeichnung, COUNT(*) AS AnzahlBuchungen
    FROM cobra.CdaBuchKtoSt kt
    JOIN cobra.SKR51SachKto sk ON sk.KontoNummer = kt.KtoNr
    GROUP BY sk.Bezeichnung
    ORDER BY AnzahlBuchungen DESC
  verified: true
  row_count: 5
  chart_hint: bar

- id: finance_billing_missing_due_date
  node: FINANCE.WORKSHOP_BILLING
  bucket: B
  question: "Bei wie vielen Rechnungen fehlt das Fälligkeitsdatum?"
  reference_sql: |
    SELECT COUNT(*) AS MissingFaelligDatum
    FROM cobra.CdaBuchKopf
    WHERE FaelligDatum IS NULL
  verified: true
  row_count: 1
  chart_hint: kpi
  note: "KNOWN GAP: FaelligDatum (due date) is only ~58% populated on CdaBuchKopf (75100/129966 have it, so ~54866 don't) -- means any 'overdue by N days' answer necessarily covers less than half the receivables ledger. Kept as a documented data-quality caveat rather than a clean aging-report few-shot; see docs/scope-trees.md Known Gaps."

# --- FINANCE.POS_CASH (#40) -----------------------------------------------------------------
