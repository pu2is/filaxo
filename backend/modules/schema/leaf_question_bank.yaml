  reference_sql: |
    SELECT COUNT(*) AS ValidMovements
    FROM cobra.CdcBewegungen
    WHERE Storno = '0'
  verified: true
  row_count: 1
  chart_hint: kpi
  note: "The doc's own 现实中容易出现的问题 table claims a 'Storno = J' reversal flag -- the live column is actually '0'/'1' ('0' = valid, 7247/7498 rows; '1' = reversed, 251/7498); 'J' never appears at all. A query filtering on 'J' would silently match nothing."

- id: finance_pos_cash_by_zahlart
  node: FINANCE.POS_CASH
  bucket: A
  question: "Wie verteilen sich die Kassenbewegungen auf die Zahlungsarten?"
  reference_sql: |
