- id: finance_pos_orders_avg_positions
  node: FINANCE.POS_ORDERS
  bucket: A
  question: "Wie viele Positionen hat ein POS-Eigenauftrag im Durchschnitt?"
  reference_sql: |
    SELECT AVG(CAST(cnt AS FLOAT)) AS AvgPositionsPerOrder
    FROM (
      SELECT AUFTRAGK_ID, COUNT(*) AS cnt
      FROM cobra.CdcAuftragsPos
      GROUP BY AUFTRAGK_ID
    ) t
  verified: true
  row_count: 1
  chart_hint: kpi

- id: finance_pos_orders_storno_count
  node: FINANCE.POS_ORDERS
  bucket: B
  question: "Wie viele POS-Eigenaufträge wurden storniert?"
  reference_sql: |
    SELECT COUNT(*) AS StornoCount
    FROM cobra.CdcAuftragK
    WHERE Storno != '0'
  verified: true
  row_count: 1
  chart_hint: kpi
  note: "Storno is NOT the doc's claimed 'J'/'N' flag -- real values are '0' (not reversed, 30/47 rows) / '1'/'2'/'3' (17/47 rows total, different reversal states with no verified dictionary distinguishing them). Held out of few-shots for the small/thin subset, same reasoning as finance_pos_cash_storno_count."

